<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>家庭图书管理助手</title>
    <!-- TailwindCSS + Font Awesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- 自定义样式 -->
    <link rel="stylesheet" href="css/style.css">
    <!-- PWA manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
</head>
<body class="bg-gray-100 pb-16">
    <!-- 底部导航栏 -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around items-center py-2 z-10">
        <button id="nav-books" class="nav-btn flex flex-col items-center text-gray-600 active:text-blue-600">
            <i class="fas fa-book text-xl"></i>
            <span class="text-xs">图书</span>
        </button>
        <button id="nav-add" class="nav-btn flex flex-col items-center text-gray-600">
            <i class="fas fa-plus-circle text-xl"></i>
            <span class="text-xs">添加</span>
        </button>
        <button id="nav-stats" class="nav-btn flex flex-col items-center text-gray-600">
            <i class="fas fa-chart-bar text-xl"></i>
            <span class="text-xs">统计</span>
        </button>
        <button id="nav-settings" class="nav-btn flex flex-col items-center text-gray-600">
            <i class="fas fa-cog text-xl"></i>
            <span class="text-xs">设置</span>
        </button>
    </nav>

    <!-- 主视图容器 -->
    <main id="app" class="container mx-auto px-4 pt-4">
        <!-- 动态内容将在这里渲染 -->
    </main>

    <!-- 全局弹窗容器 -->
    <div id="modal-container" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-20 hidden">
        <div class="bg-white rounded-lg p-6 w-11/12 max-w-md">
            <div id="modal-content"></div>
        </div>
    </div>

    <!-- 引入第三方库 -->
    <script src="https://unpkg.com/dexie@3.2.3/dist/dexie.js"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- 自定义模块 -->
    <script type="module" src="js/db.js"></script>
    <script type="module" src="js/api.js"></script>
    <script type="module" src="js/backup.js"></script>
    <script type="module" src="js/scanner.js"></script>
    <script type="module" src="js/views.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
